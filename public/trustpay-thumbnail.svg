<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080808"/>
      <stop offset="0.55" stop-color="#171717"/>
      <stop offset="1" stop-color="#262626"/>
    </linearGradient>
  </defs>

  <!-- Full 16:9 bleed — no inset “picture frame” wasting edges -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Thin edge definition only -->
  <rect x="0.5" y="0.5" width="1279" height="719" rx="0" fill="none" stroke="#3f3f46" stroke-width="1" opacity="0.6"/>

  <!-- Top accent -->
  <rect x="48" y="32" width="1184" height="3" rx="1.5" fill="#525252" opacity="0.9"/>

  <!-- SCF -->
  <rect x="48" y="52" width="168" height="40" rx="20" fill="#2e2e2e" stroke="#a1a1aa"/>
  <text x="72" y="78" fill="#fafafa" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="17" font-weight="700">SCF Build</text>

  <!-- Hero: uses full width, dominant scale -->
  <text x="48" y="198" fill="#ffffff" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="-0.02em">TrustPay</text>

  <text x="48" y="258" fill="#f4f4f5" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="36" font-weight="600">Milestone escrow on Stellar</text>
  <text x="48" y="302" fill="#d4d4d8" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="26">Approval-gated release · ledger-backed settlement</text>
  <text x="48" y="340" fill="#a1a1aa" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="23">Stellar SDK · Horizon / RPC · testnet-first path</text>
  <text x="48" y="378" fill="#a1a1aa" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="21">1:1 and small-team contracts · complements bulk disbursement (e.g. SDP)</text>

  <!-- Pills -->
  <rect x="48" y="408" width="118" height="44" rx="22" fill="#27272a" stroke="#71717a"/>
  <text x="107" y="436" text-anchor="middle" fill="#fafafa" font-family="system-ui, Arial, sans-serif" font-size="18" font-weight="600">Escrow</text>
  <rect x="178" y="408" width="132" height="44" rx="22" fill="#27272a" stroke="#71717a"/>
  <text x="244" y="436" text-anchor="middle" fill="#fafafa" font-family="system-ui, Arial, sans-serif" font-size="18" font-weight="600">Horizon</text>
  <rect x="322" y="408" width="128" height="44" rx="22" fill="#27272a" stroke="#71717a"/>
  <text x="386" y="436" text-anchor="middle" fill="#fafafa" font-family="system-ui, Arial, sans-serif" font-size="18" font-weight="600">Testnet</text>

  <!-- Horizontal pipeline: uses 16:9 width, reads as one flow -->
  <text x="48" y="498" fill="#e4e4e7" font-family="system-ui, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="0.04em">EXECUTION FLOW</text>

  <!-- Step 1 -->
  <rect x="48" y="518" width="372" height="152" rx="20" fill="#1f1f1f" stroke="#71717a" stroke-width="2"/>
  <text x="234" y="568" text-anchor="middle" fill="#ffffff" font-family="system-ui, Arial, sans-serif" font-size="32" font-weight="700">Fund escrow</text>
  <text x="234" y="608" text-anchor="middle" fill="#d4d4d8" font-family="system-ui, Arial, sans-serif" font-size="21">Client funds · SDK-built tx</text>
  <text x="234" y="642" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, Arial, sans-serif" font-size="18">Horizon / RPC confirm</text>

  <!-- Arrow 1 -->
  <polygon points="446,582 474,594 446,606" fill="#a1a1aa"/>

  <!-- Step 2 -->
  <rect x="488" y="518" width="372" height="152" rx="20" fill="#1f1f1f" stroke="#71717a" stroke-width="2"/>
  <text x="674" y="568" text-anchor="middle" fill="#ffffff" font-family="system-ui, Arial, sans-serif" font-size="32" font-weight="700">Approve milestone</text>
  <text x="674" y="608" text-anchor="middle" fill="#d4d4d8" font-family="system-ui, Arial, sans-serif" font-size="21">State-gated · no silent payout</text>
  <text x="674" y="642" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, Arial, sans-serif" font-size="18">Product + ledger aligned</text>

  <!-- Arrow 2 -->
  <polygon points="886,582 914,594 886,606" fill="#a1a1aa"/>

  <!-- Step 3 -->
  <rect x="928" y="518" width="304" height="152" rx="20" fill="#1f1f1f" stroke="#a1a1aa" stroke-width="2"/>
  <rect x="970" y="552" width="220" height="52" rx="12" fill="#52525b" stroke="#d4d4d8"/>
  <text x="1080" y="580" text-anchor="middle" dominant-baseline="middle" fill="#fafafa" font-family="system-ui, Arial, sans-serif" font-size="22" font-weight="700">Release tranche</text>
  <text x="1080" y="632" text-anchor="middle" fill="#d4d4d8" font-family="system-ui, Arial, sans-serif" font-size="18">Payout after approval</text>

  <!-- Bottom bar -->
  <rect x="48" y="688" width="1184" height="2" fill="#3f3f46"/>
  <text x="640" y="706" text-anchor="middle" fill="#71717a" font-family="system-ui, Arial, sans-serif" font-size="15">TrustPay · Stellar Community Fund</text>
</svg>
